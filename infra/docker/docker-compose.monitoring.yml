version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: nukunu-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alerting_rules.yml:/etc/prometheus/alerting_rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    networks:
      - nukunu-network
    restart: always
    user: "0:0"
    # Limites strictes pour t2/t3.micro (1GB RAM)
    mem_limit: 300m
    memswap_limit: 600m
    cpus: "0.2"

  grafana:
    image: grafana/grafana:latest
    container_name: nukunu-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - nukunu-network
    restart: always
    # Limites ajustées : Grafana requiert plus de RAM au démarrage (OOMKilled)
    mem_limit: 500m
    memswap_limit: 800m
    cpus: "0.2"

networks:
  nukunu-network:
    external: true

volumes:
  prometheus_data:
  grafana_data:
