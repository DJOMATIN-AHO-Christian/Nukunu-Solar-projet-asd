---
- name: Hardening OS & Base Setup
  hosts: all
  become: yes
  tasks:
    - name: Update apt cache and upgrade packages
      apt:
        update_cache: yes
        upgrade: dist

    - name: Install essential security packages
      apt:
        name:
          - unattended-upgrades
          - fail2ban
          - ufw
        state: present

    - name: Create 'deploy' user with sudo privileges
      user:
        name: deploy
        shell: /bin/bash
        groups: sudo
        append: yes
        create_home: yes

    - name: Allow 'deploy' to have passwordless sudo
      lineinfile:
        dest: /etc/sudoers
        state: present
        regexp: '^deploy'
        line: 'deploy ALL=(ALL) NOPASSWD: ALL'
        validate: 'visudo -cf %s'

    - name: Set authorized key for 'deploy'
      authorized_key:
        user: deploy
        state: present
        # Pointing to the deployer's public key
        key: "{{ lookup('file', '~/.ssh/id_ed25519.pub') }}"

    - name: Disable password auth & root login in SSH
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
      loop:
        - { regexp: '^#?PermitRootLogin', line: 'PermitRootLogin no' }
        - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication no' }
      notify: Restart SSH

    - name: Setup UFW firewall rules
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - '22'
        - '80'
        - '443'
        - '6443'

    - name: Enable UFW
      ufw:
        state: enabled
        policy: reject

  handlers:
    - name: Restart SSH
      service:
        name: ssh
        state: restarted
