---
- name: Install Docker Engine
  hosts: all
  become: yes
  tasks:
    - name: Install prerequisites
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
        state: present

    - name: Add Docker GPG apt Key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker Repository
      apt_repository:
        # Détection automatique : amd64 (AWS EC2) ou arm64 (OCI Ampere A1)
        repo: "deb [arch={{ ansible_architecture | replace('aarch64','arm64') | replace('x86_64','amd64') }}] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        update_cache: yes

    - name: Add 'deploy' user to docker group
      user:
        name: deploy
        groups: docker
        append: yes

    - name: Configure Docker daemon JSON (log rotation)
      copy:
        dest: /etc/docker/daemon.json
        content: |
          {
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "100m",
              "max-file": "3"
            }
          }
      notify: Restart Docker

    # ── SAUVEGARDE POSTGRESQL (BC02-CP2) ──────────────────
    - name: "BC02-CP2 — Créer le dossier des scripts"
      file:
        path: /opt/nukunu/scripts
        state: directory
        owner: deploy
        group: docker
        mode: '0755'

    - name: "BC02-CP2 — Déployer le script de backup"
      copy:
        src: ../../../scripts/provision/backup-db.sh
        dest: /opt/nukunu/scripts/backup-db.sh
        owner: deploy
        group: docker
        mode: '0755'

    - name: "BC02-CP2 — Configurer le cron de backup (Chaque nuit à 03:00)"
      cron:
        name: "Nukunu Daily DB Backup"
        minute: "0"
        hour: "3"
        user: deploy
        job: "/opt/nukunu/scripts/backup-db.sh >> /opt/nukunu/backups/cron.log 2>&1"

  handlers:
    - name: Restart Docker
      systemd:
        name: docker
        state: restarted
        daemon_reload: yes
