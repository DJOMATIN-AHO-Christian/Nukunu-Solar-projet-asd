---
# ════════════════════════════════════════════════════════════
# Playbook Ansible — Déploiement Environnement Staging
# Bloc REAC : BC02 — CP5 (environnement de test distinct)
# Usage : ansible-playbook -i inventory/staging/hosts playbooks/staging.yml
# ════════════════════════════════════════════════════════════

- name: Déploiement Environnement de Test Staging — Nukunu Solar (BC02-CP5)
  hosts: staging
  become: yes
  vars:
    app_dir: /opt/nukunu/staging
    app_version: "{{ api_version | default('latest') }}"
    db_name: nukunu_staging
    node_env: staging

  tasks:
    - name: "[CP5] Afficher l'environnement de déploiement"
      debug:
        msg: >
          Déploiement Staging — Environnement : {{ env }}
          Cible : {{ ansible_host }}
          Version API : {{ app_version }}
          DB : {{ db_host }}/{{ db_name }}

    - name: Créer les répertoires de l'application staging
      file:
        path: "{{ item }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'
      loop:
        - "{{ app_dir }}"
        - "{{ app_dir }}/logs"

    - name: Copier le docker-compose de staging
      template:
        src: "{{ playbook_dir }}/../docker/docker-compose.yml"
        dest: "{{ app_dir }}/docker-compose.yml"
      vars:
        environment_name: staging
        db_database: "{{ db_name }}"

    - name: Vérifier que le réseau Docker existe
      shell: docker network inspect nukunu-network || docker network create nukunu-network
      ignore_errors: yes

    - name: "[CP5] Démarrer l'application en mode Staging"
      shell: |
        cd {{ app_dir }}
        NODE_ENV=staging \
        DB_HOST={{ db_host }} \
        DB_NAME={{ db_name }} \
        PORT=3003 \
        docker compose up -d --pull always
      register: staging_up

    - name: Attendre que le service staging réponde
      uri:
        url: "http://localhost:3003/api/health"
        status_code: 200
      retries: 10
      delay: 5
      register: staging_health

    - name: "[CP5] Valider la séparation prod/staging"
      assert:
        that:
          - staging_health.status == 200
        fail_msg: "❌ Le staging ne répond pas — déploiement échoué"
        success_msg: "✅ Staging opérationnel sur {{ ansible_host }}:3003 (isolé de la production)"

    - name: Afficher le résumé de déploiement staging
      debug:
        msg: |
          ════════════════════════════════════════
          ✅ ENVIRONNEMENT STAGING OPÉRATIONNEL
          ════════════════════════════════════════
          URL       : http://{{ ansible_host }}:3003
          Version   : {{ app_version }}
          DB        : {{ db_host }}/{{ db_name }}
          Isolation : Port 3003 ≠ Production (3002)
          BC02-CP5  : CONFORME
          ════════════════════════════════════════
