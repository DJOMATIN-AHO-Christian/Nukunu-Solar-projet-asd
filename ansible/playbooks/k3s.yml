---
- name: Install K3s (Lightweight Kubernetes)
  hosts: master
  become: yes
  tasks:
    - name: Download and install K3s script
      shell: curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for node to be ready
      command: k3s kubectl get nodes
      register: k3s_nodes
      until: '"Ready" in k3s_nodes.stdout'
      retries: 10
      delay: 5

    - name: Ensure .kube directory exists for 'deploy'
      file:
        path: /home/deploy/.kube
        state: directory
        owner: deploy
        group: deploy
        mode: '0755'

    - name: Copy K3s config to 'deploy' kube config
      copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: /home/deploy/.kube/config
        remote_src: yes
        owner: deploy
        group: deploy
        mode: '0600'
