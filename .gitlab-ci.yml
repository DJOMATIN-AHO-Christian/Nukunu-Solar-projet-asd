# ════════════════════════════════════════════════════════════
# GitLab CI/CD Configuration — Nukunu Solar
# BC02-CP8 : Pipeline complet (lint + build + test + deploy)
# ════════════════════════════════════════════════════════════

stages:
  - lint
  - build
  - test
  - deploy

variables:
  DOCKER_IMAGE: "nukunu/solar-backend:${CI_COMMIT_SHORT_SHA}"
  ANSIBLE_HOST_KEY_CHECKING: "False"

# ── 1. Linting (Qualité de code — BC02-CP8) ──────────────────
lint_backend:
  stage: lint
  image: node:20-alpine
  cache:
    key: "$CI_COMMIT_REF_SLUG-node"
    paths:
      - server/node_modules/
  script:
    - cd server
    - npm ci --prefer-offline
    - npm run lint
  allow_failure: false

# ── 2. Build Docker (BC02-CP7) ──────────────────────────────
build_docker:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_DRIVER: overlay2
  script:
    - docker build -t $DOCKER_IMAGE -f docker/backend.Dockerfile .
    - echo "✅ Build Docker réussi — image $DOCKER_IMAGE"
  needs: ["lint_backend"]

# ── 3. Scan Sécurité Trivy (BC02-CP8 / BC01-CP3) ────────────
security_scan:
  stage: test
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - trivy image --severity HIGH,CRITICAL --exit-code 1 $DOCKER_IMAGE
  needs: ["build_docker"]
  allow_failure: false

# ── 4a. Déploiement Staging (BC02-CP5) ──────────────────────
deploy_staging:
  stage: deploy
  image: python:3.11-slim
  before_script:
    - pip install ansible --quiet
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
  script:
    - echo "🚀 Déploiement sur l'environnement Staging (BC02-CP5)..."
    - ansible-playbook
        -i ansible/inventory/staging/hosts
        ansible/playbooks/staging.yml
        -e "api_version=${CI_COMMIT_SHORT_SHA}"
    - echo "✅ Staging déployé — http://nukunu-staging.local:3003"
  environment:
    name: staging
    url: http://10.0.0.10:3003
  only:
    - main
  needs: ["security_scan"]

# ── 4b. Déploiement Production (BC02-CP8) ────────────────────
deploy_production:
  stage: deploy
  image: python:3.11-slim
  before_script:
    - pip install ansible --quiet
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
  script:
    - echo "🚀 Déploiement en Production (BC02-CP8)..."
    - ansible-playbook
        -i ansible/inventory/hosts.ini
        ansible/playbooks/docker.yml
        -e "docker_image=${DOCKER_IMAGE}"
    - echo "✅ Production mise à jour — version ${CI_COMMIT_SHORT_SHA}"
  environment:
    name: production
    url: https://nukunu-solar.dev
  when: manual
  only:
    - tags
  needs: ["deploy_staging"]
