# ════════════════════════════════════════════════════════════
# GitLab CI/CD Configuration — Nukunu Solar
# BC02-CP8 : Pipeline complet (lint + build + scan + deploy)
# Cibles : OCI (original) + AWS Free Tier (ec2 t2.micro)
# ════════════════════════════════════════════════════════════

stages:
  - lint
  - build
  - test
  - deploy

variables:
  DOCKER_IMAGE: "nukunu/solar-backend:${CI_COMMIT_SHORT_SHA}"
  ANSIBLE_HOST_KEY_CHECKING: "False"
  # Variables AWS — à définir dans GitLab > Settings > CI/CD > Variables
  # AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, DB_PASSWORD, JWT_SECRET

# ── 1. Linting ESLint (Qualité de code — BC02-CP8) ──────────
lint_backend:
  stage: lint
  image: node:20-alpine
  cache:
    key: "$CI_COMMIT_REF_SLUG-node"
    paths:
      - server/node_modules/
  script:
    - cd server
    - npm ci --prefer-offline
    - npm run lint
  allow_failure: false

# ── 2. Build Docker amd64 (BC02-CP7) ────────────────────────
build_docker:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_BUILDKIT: "1"
  script:
    # Build multi-platform si registry disponible, sinon amd64 uniquement
    - docker build
        --platform linux/amd64
        -t $DOCKER_IMAGE
        -f infra/docker/backend.Dockerfile .
    - echo "✅ Build Docker amd64 réussi — image $DOCKER_IMAGE"
    # Push vers registry (si DOCKER_REGISTRY_USER défini)
    - |
      if [ -n "$DOCKER_REGISTRY_USER" ]; then
        echo $DOCKER_REGISTRY_TOKEN | docker login -u $DOCKER_REGISTRY_USER --password-stdin
        docker push $DOCKER_IMAGE
        echo "✅ Image poussée vers le registry"
      fi
  needs: ["lint_backend"]

# ── 3. Scan Sécurité Trivy (BC02-CP8 / BC01-CP3) ────────────
security_scan:
  stage: test
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - echo "🔍 Scan de vulnérabilités Trivy (HIGH + CRITICAL)..."
    - trivy image --severity HIGH,CRITICAL --exit-code 1 $DOCKER_IMAGE
    - echo "✅ Scan Trivy terminé — aucune vulnérabilité critique"
  needs: ["build_docker"]
  allow_failure: false

# ── 3.5. Tests E2E API (BC02-CP5) ───────────────────────────
test_api:
  stage: test
  image: node:20-alpine
  services:
    - postgres:16-alpine
  variables:
    POSTGRES_USER: nukunu_admin
    POSTGRES_PASSWORD: nukunu_password
    POSTGRES_DB: nukunu_solar
    DB_HOST: postgres
    PORT: 3015
    JWT_SECRET: test_ci_secret_123
  script:
    - echo "🏗️ Exécution des tests fonctionnels de l'API..."
    - cd server
    - npm ci --prefer-offline
    - npm run test
    - echo "✅ Tests E2E terminés avec succès"
  needs: ["lint_backend"]
  allow_failure: false

# ── 4a. Déploiement Staging OCI (BC02-CP5) ──────────────────
deploy_staging_oci:
  stage: deploy
  image: python:3.11-slim
  before_script:
    - pip install ansible --quiet
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
  script:
    - echo "🚀 [OCI] Déploiement sur l'environnement Staging (BC02-CP5)..."
    - ansible-playbook
        -i infra/ansible/inventory/staging/hosts
        infra/ansible/playbooks/staging.yml
        -e "api_version=${CI_COMMIT_SHORT_SHA}"
    - echo "✅ Staging OCI déployé"
  environment:
    name: staging-oci
    url: http://10.0.0.10:3003
  needs: ["security_scan", "test_api"]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && ($CLOUD_TARGET == "oci" || $CLOUD_TARGET == null)'
      when: on_success

# ── 4b. Déploiement Production OCI (main + manual) ──────────
deploy_production_oci:
  stage: deploy
  image: python:3.11-slim
  before_script:
    - pip install ansible --quiet
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
  script:
    - echo "🚀 [OCI] Déploiement en Production sur l'infra OCI..."
    - ansible-playbook
        -i infra/ansible/inventory/hosts.ini
        infra/ansible/playbooks/docker.yml
        -e "docker_image=${DOCKER_IMAGE}"
  environment:
    name: production-oci
    url: https://nukunu-solar.dev
  needs: ["deploy_staging_oci"]
  rules:
    - if: '$CI_COMMIT_TAG && ($CLOUD_TARGET == "oci" || $CLOUD_TARGET == null)'
      when: manual

# ── 5a. Déploiement AWS Free Tier (auto sur main) ───────────
deploy_aws_staging:
  stage: deploy
  image: python:3.11-slim
  before_script:
    - pip install ansible boto3 botocore --quiet
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY_AWS" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
  script:
    - echo "🚀 [AWS] Déploiement sur EC2 t2.micro (Free Tier)..."
    - ansible-playbook
        -i infra/ansible/inventory/aws/hosts
        infra/ansible/playbooks/deploy_aws.yml
        --extra-vars "docker_image=${DOCKER_IMAGE}"
      --extra-vars "db_password=${DB_PASSWORD}"
      --extra-vars "jwt_secret=${JWT_SECRET}"
      --extra-vars "allowed_origins=${APP_URL:-http://localhost:3002}"
    - echo "✅ Application déployée sur AWS EC2 Free Tier"
  environment:
    name: production-aws
    url: http://$AWS_INSTANCE_IP:3002
  needs: ["security_scan", "test_api"]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CLOUD_TARGET == "aws"'
      when: on_success
  # Variables CI/CD GitLab requises :
  # SSH_PRIVATE_KEY_AWS - Clé privée SSH pour l'instance EC2
  # AWS_INSTANCE_IP     - IP Elastic de l'instance (terraform output)
  # DB_PASSWORD         - Mot de passe PostgreSQL (masked)
  # JWT_SECRET          - Secret JWT (masked)
  # CLOUD_TARGET        - Valeur "aws" pour activer ce job

# ── 5b. Provisionnement Terraform AWS (manuel) ──────────────
terraform_aws_apply:
  stage: deploy
  image:
    name: hashicorp/terraform:latest
    entrypoint: [""]
  variables:
    TF_VAR_aws_region: ${AWS_REGION:-eu-west-3}
    TF_VAR_admin_ip_cidr: ${ADMIN_IP_CIDR}
    TF_VAR_ssh_public_key: ${SSH_PUBLIC_KEY}
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
  script:
    - echo "🏗️ Provisionnement infrastructure AWS via Terraform..."
    - cd infra/terraform/aws
    - terraform init
    - terraform validate
    - terraform plan -out=tfplan
    - terraform apply -auto-approve tfplan
    - echo "✅ Infrastructure AWS provisionnée"
    - terraform output ansible_inventory_entry
  artifacts:
    paths:
      - infra/terraform/aws/terraform.tfstate
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CLOUD_TARGET == "aws"'
      when: manual
