# ════════════════════════════════════════════════════════════
# GitLab CI/CD Configuration — Nukunu Solar
# ════════════════════════════════════════════════════════════

stages:
  - lint
  - build
  - test
  - deploy

variables:
  DOCKER_IMAGE: "nukunu/solar-backend:${CI_COMMIT_SHORT_SHA}"

# 1. Étape de Linting (Qualité de code)
lint_backend:
  stage: lint
  image: node:20-alpine
  script:
    - cd server
    - npm install
    - npm run lint

# 2. Étape de Build (Vérification de la conteneurisation)
build_docker:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_DRIVER: overlay2
  script:
    - docker build -t $DOCKER_IMAGE -f docker/backend.Dockerfile .
    - echo "✅ Build Docker réussi"

# 3. Scan de Sécurité (Conformité BC02-CP8)
security_scan:
  stage: test
  image: 
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - trivy image --severity HIGH,CRITICAL $DOCKER_IMAGE

# 4. Déploiement Staging (Simulation BC02-CP5)
deploy_staging:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache ansible
  script:
    - echo "🚀 Déploiement sur l'environnement de Test (10.0.0.10)..."
    - # ansible-playbook -i ansible/inventory/staging ansible/playbooks/site.yml
    - echo "✅ Environnement de Test prêt"
  environment:
    name: staging
  only:
    - main
